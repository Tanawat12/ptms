<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PTMS — Production Training Management System</title>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%237AB8E6'/><text x='16' y='22' text-anchor='middle' font-family='system-ui' font-size='18' font-weight='800' fill='white'>P</text></svg>" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #F6F8FB;
  --bg-elevated: #FFFFFF;
  --bg-subtle: #EEF2F7;
  --bg-tinted: #EFF6FB;
  --border: #E2E8F0;
  --border-strong: #CBD5E1;
  --border-soft: #EDF1F6;
  --text: #0F172A;
  --text-secondary: #475569;
  --text-muted: #94A3B8;
  --text-faint: #B8C3D1;
  --accent: #7AB8E6;
  --accent-hover: #5FA5DC;
  --accent-soft: #DBEAFE;
  --accent-softer: #EFF6FB;
  --accent-text: #2A6FB0;
  --success: #86C5A8;
  --success-soft: #E3F1EA;
  --success-text: #2E7D5A;
  --warn: #E8B86B;
  --warn-soft: #FBF1DD;
  --warn-text: #9A6A1F;
  --danger: #E89B9B;
  --danger-soft: #FBE6E6;
  --danger-text: #B14545;
  --critical: #C56B6B;
  --regular: #7AB8E6;
  --lite: #B8C3D1;
  --font: 'Manrope', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 18px;
  --shadow-xs: 0 1px 2px rgba(15, 23, 42, 0.04);
  --shadow-sm: 0 2px 6px rgba(15, 23, 42, 0.05);
  --shadow-md: 0 6px 18px rgba(15, 23, 42, 0.07);
  --shadow-lg: 0 12px 32px rgba(15, 23, 42, 0.10);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, select, textarea { font-family: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
ul { list-style: none; padding: 0; margin: 0; }

.app { display: grid; grid-template-columns: 240px 200px 1fr; grid-template-rows: 56px 1fr; height: 100vh; width: 100vw; overflow: hidden; }
.app.no-subnav { grid-template-columns: 240px 1fr; }

.topbar { grid-column: 1 / -1; background: var(--bg-elevated); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; z-index: 10; }
.brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 15px; letter-spacing: -0.01em; width: 220px; }
.brand-mark { width: 28px; height: 28px; border-radius: 7px; background: linear-gradient(135deg, #7AB8E6, #A8C8E8); display: grid; place-items: center; color: white; font-weight: 800; font-size: 13px; box-shadow: var(--shadow-sm); }
.brand-name { color: var(--text); }
.brand-sub { color: var(--text-muted); font-weight: 500; font-size: 11px; letter-spacing: 0.02em; }
.topbar-search { flex: 1; max-width: 480px; display: flex; align-items: center; gap: 8px; height: 34px; padding: 0 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-md); color: var(--text-muted); font-size: 13px; }
.topbar-search input { flex: 1; border: none; background: none; outline: none; color: var(--text); font-size: 13px; }
.topbar-search kbd { font-family: var(--mono); font-size: 10px; padding: 2px 5px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); }
.topbar-spacer { flex: 1; }
.topbar-actions { display: flex; align-items: center; gap: 6px; }
.icon-btn { width: 34px; height: 34px; display: grid; place-items: center; border-radius: var(--r-md); color: var(--text-secondary); position: relative; transition: background 120ms; }
.icon-btn:hover { background: var(--bg-subtle); }
.icon-btn .dot { position: absolute; top: 8px; right: 8px; width: 7px; height: 7px; border-radius: 50%; background: var(--danger); border: 2px solid var(--bg-elevated); }
.role-switcher { display: flex; align-items: center; gap: 8px; height: 34px; padding: 0 10px 0 6px; background: var(--bg-tinted); border: 1px solid var(--accent-soft); border-radius: var(--r-md); font-size: 12px; font-weight: 600; color: var(--accent-text); }
.role-switcher select { border: none; background: none; outline: none; font-weight: 600; color: var(--accent-text); font-size: 12px; font-family: inherit; }
.role-pill { font-size: 10px; padding: 2px 6px; background: white; border-radius: 4px; color: var(--accent-text); font-weight: 700; letter-spacing: 0.04em; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #CFE3F7, #A8C8E8); display: grid; place-items: center; color: var(--accent-text); font-weight: 700; font-size: 12px; }

.sidebar { background: var(--bg-elevated); border-right: 1px solid var(--border); padding: 16px 12px; overflow-y: auto; }
.nav-section { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-faint); padding: 14px 10px 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: var(--r-md); font-size: 13px; font-weight: 500; color: var(--text-secondary); width: 100%; text-align: left; transition: all 120ms; }
.nav-item:hover { background: var(--bg-subtle); color: var(--text); }
.nav-item.active { background: var(--accent-softer); color: var(--accent-text); font-weight: 600; }
.nav-item .nav-ico { width: 18px; height: 18px; display: grid; place-items: center; color: currentColor; opacity: 0.85; }
.nav-item .nav-badge { margin-left: auto; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 6px; background: var(--danger-soft); color: var(--danger-text); }
.nav-item .nav-badge.muted { background: var(--bg-subtle); color: var(--text-muted); }
.nav-item .nav-badge.accent { background: var(--accent-soft); color: var(--accent-text); }

.subnav { background: var(--bg); border-right: 1px solid var(--border); padding: 20px 14px; overflow-y: auto; }
.subnav-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 0 10px 10px; }
.subnav-item { display: block; padding: 8px 10px; border-radius: var(--r-sm); font-size: 13px; color: var(--text-secondary); width: 100%; text-align: left; border-left: 2px solid transparent; font-weight: 500; }
.subnav-item:hover { background: var(--bg-subtle); color: var(--text); }
.subnav-item.active { background: white; color: var(--accent-text); border-left-color: var(--accent); font-weight: 600; box-shadow: var(--shadow-xs); }
.subnav-item .sub-count { float: right; color: var(--text-muted); font-size: 11px; font-weight: 500; }

.main { overflow-y: auto; background: var(--bg); }
.page { padding: 28px 36px 80px; max-width: 1400px; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 24px; }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; margin: 0 0 4px; }
.page-subtitle { color: var(--text-muted); font-size: 13px; }
.page-actions { display: flex; gap: 8px; align-items: center; }
.breadcrumb { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; display: flex; gap: 6px; align-items: center; }
.breadcrumb span.sep { opacity: 0.5; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; height: 34px; font-size: 13px; font-weight: 600; border-radius: var(--r-md); border: 1px solid transparent; transition: all 120ms; white-space: nowrap; }
.btn-primary { background: var(--accent); color: white; box-shadow: 0 1px 2px rgba(122,184,230,0.4); }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: white; color: var(--text); border-color: var(--border-strong); }
.btn-secondary:hover { background: var(--bg-subtle); }
.btn-ghost { color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg-subtle); }
.btn-danger { background: white; color: var(--danger-text); border-color: var(--danger-soft); }
.btn-danger:hover { background: var(--danger-soft); }
.btn-sm { height: 28px; padding: 0 10px; font-size: 12px; }
.btn-lg { height: 42px; padding: 0 20px; font-size: 14px; }

.card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-lg); overflow: hidden; }
.card-pad { padding: 20px; }
.card-pad-lg { padding: 28px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.card-title { font-size: 14px; font-weight: 700; margin: 0; }
.card-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

.stat-row { display: grid; gap: 16px; }
.stat { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 18px 20px; }
.stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; display: flex; align-items: center; gap: 6px; }
.stat-value { font-size: 28px; font-weight: 700; margin-top: 6px; letter-spacing: -0.02em; }
.stat-trend { font-size: 12px; margin-top: 6px; display: flex; align-items: center; gap: 6px; color: var(--text-muted); }
.stat-trend.up { color: var(--success-text); }
.stat-trend.down { color: var(--danger-text); }

.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; border-radius: 999px; background: var(--bg-subtle); color: var(--text-secondary); letter-spacing: 0.01em; white-space: nowrap; }
.badge.accent { background: var(--accent-soft); color: var(--accent-text); }
.badge.success { background: var(--success-soft); color: var(--success-text); }
.badge.warn { background: var(--warn-soft); color: var(--warn-text); }
.badge.danger { background: var(--danger-soft); color: var(--danger-text); }
.badge.outline { background: transparent; border: 1px solid var(--border-strong); color: var(--text-secondary); }
.badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.badge-square { border-radius: var(--r-sm); padding: 3px 8px; font-family: var(--mono); font-size: 10px; }

.wi-type { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
.wi-type.critical { background: #F8D8D8; color: #8E3535; }
.wi-type.regular { background: #CFE3F7; color: #2A6FB0; }
.wi-type.lite { background: #E5E9F0; color: #555F73; }

.table-wrap { overflow-x: auto; }
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl thead th { text-align: left; padding: 12px 16px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); background: var(--bg); border-bottom: 1px solid var(--border); position: sticky; top: 0; }
.tbl tbody td { padding: 14px 16px; border-bottom: 1px solid var(--border-soft); vertical-align: middle; }
.tbl tbody tr:last-child td { border-bottom: none; }
.tbl tbody tr:hover { background: var(--bg); }
.tbl .cell-strong { font-weight: 600; color: var(--text); }
.tbl .cell-muted { color: var(--text-muted); font-size: 12px; }
.tbl .cell-mono { font-family: var(--mono); font-size: 12px; }
.row-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 100ms; }
.tbl tbody tr:hover .row-actions { opacity: 1; }

.field { display: flex; flex-direction: column; gap: 6px; }
.field-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
.field-hint { font-size: 11px; color: var(--text-muted); }
.input, .select, .textarea { height: 38px; padding: 0 12px; border: 1px solid var(--border); background: white; border-radius: var(--r-md); font-size: 13px; outline: none; transition: border-color 120ms, box-shadow 120ms; }
.input:focus, .select:focus, .textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-softer); }
.textarea { height: auto; padding: 10px 12px; resize: vertical; min-height: 80px; }
.field-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.field-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

.toolbar { display: flex; align-items: center; gap: 8px; padding: 12px 16px; border-bottom: 1px solid var(--border-soft); background: var(--bg-elevated); }
.toolbar .search { flex: 1; max-width: 320px; display: flex; align-items: center; gap: 8px; height: 32px; padding: 0 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--r-md); color: var(--text-muted); font-size: 12px; }
.toolbar .search input { flex: 1; border: none; outline: none; background: none; font-size: 13px; color: var(--text); }
.toolbar .spacer { flex: 1; }

.chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; height: 28px; background: white; border: 1px solid var(--border); border-radius: 999px; font-size: 12px; font-weight: 500; color: var(--text-secondary); }
.chip:hover { background: var(--bg-subtle); }
.chip.active { background: var(--accent-softer); border-color: var(--accent-soft); color: var(--accent-text); }

.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); padding: 0 20px; }
.tab { padding: 12px 14px; font-size: 13px; font-weight: 500; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent-text); border-bottom-color: var(--accent); font-weight: 600; }

.tree { font-size: 13px; }
.tree-node { padding: 6px 0; }
.tree-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: var(--r-sm); }
.tree-row:hover { background: var(--bg-subtle); }
.tree-row.selected { background: var(--accent-softer); }
.tree-children { margin-left: 22px; border-left: 1px dashed var(--border-strong); padding-left: 12px; }

.kbd { font-family: var(--mono); font-size: 10px; padding: 1px 5px; background: white; border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); }
.divider { height: 1px; background: var(--border-soft); margin: 16px 0; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .es-ico { width: 48px; height: 48px; margin: 0 auto 12px; background: var(--bg-subtle); border-radius: 12px; display: grid; place-items: center; color: var(--text-faint); }

.modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(4px); display: grid; place-items: center; z-index: 100; animation: fadeIn 150ms ease; }
.modal { background: white; border-radius: var(--r-xl); width: 560px; max-width: 92vw; max-height: 88vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: var(--shadow-lg); animation: slideUp 200ms ease; }
.modal-lg { width: 760px; }
.modal-xl { width: 920px; }
.modal-header { padding: 18px 22px; border-bottom: 1px solid var(--border-soft); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 16px; font-weight: 700; margin: 0; }
.modal-body { padding: 22px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 14px 22px; border-top: 1px solid var(--border-soft); display: flex; justify-content: flex-end; gap: 8px; background: var(--bg); }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.toast-stack { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
.toast { background: white; border: 1px solid var(--border); border-left: 3px solid var(--success); border-radius: var(--r-md); padding: 12px 16px; min-width: 280px; box-shadow: var(--shadow-md); font-size: 13px; display: flex; align-items: center; gap: 10px; animation: slideInRight 200ms ease; }
.toast.warn { border-left-color: var(--warn); }
.toast.danger { border-left-color: var(--danger); }
@keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

.login-wrap { min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 20% 0%, var(--accent-softer), transparent 50%), radial-gradient(circle at 80% 100%, #E8EEF5, transparent 50%), var(--bg); padding: 24px; }
.login-card { width: 420px; max-width: 100%; background: white; border: 1px solid var(--border); border-radius: var(--r-xl); padding: 36px; box-shadow: var(--shadow-md); }
.login-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.login-title { font-size: 22px; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.015em; }
.login-sub { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; }

.wizard-steps { display: flex; align-items: center; margin-bottom: 28px; }
.wstep { flex: 1; display: flex; align-items: center; font-size: 12px; font-weight: 600; color: var(--text-muted); }
.wstep-num { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; background: var(--bg-subtle); color: var(--text-muted); font-size: 12px; font-weight: 700; margin-right: 8px; border: 2px solid var(--bg-subtle); }
.wstep.active .wstep-num { background: var(--accent); color: white; border-color: var(--accent-soft); }
.wstep.done .wstep-num { background: var(--success); color: white; border-color: var(--success-soft); }
.wstep.active { color: var(--text); }
.wstep.done { color: var(--success-text); }
.wstep-line { flex: 1; height: 2px; background: var(--bg-subtle); margin: 0 12px; }
.wstep.done + .wstep-line { background: var(--success); }

.skill-cell { width: 36px; height: 36px; display: grid; place-items: center; font-weight: 700; font-size: 12px; border-radius: var(--r-sm); margin: 0 auto; }
.skill-0 { background: #F1F4F8; color: var(--text-faint); }
.skill-1 { background: #DCEBF7; color: var(--accent-text); }
.skill-2 { background: #B8DCF1; color: #1F5A8E; font-weight: 800; }
.skill-x { background: var(--danger-soft); color: var(--danger-text); }

.wi-sidebar { width: 240px; flex-shrink: 0; border-right: 1px solid var(--border); background: var(--bg); padding: 16px; }
.wi-step { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--r-md); font-size: 13px; color: var(--text-secondary); cursor: pointer; margin-bottom: 2px; }
.wi-step:hover { background: var(--bg-subtle); }
.wi-step.active { background: white; border: 1px solid var(--border); color: var(--text); font-weight: 600; box-shadow: var(--shadow-xs); }
.wi-step-num { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-subtle); color: var(--text-muted); display: grid; place-items: center; font-size: 11px; font-weight: 700; }
.wi-step.active .wi-step-num { background: var(--accent); color: white; }
.wi-step.done .wi-step-num { background: var(--success); color: white; }

.progress-track { height: 6px; background: var(--bg-subtle); border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 999px; transition: width 300ms ease; }

.img-placeholder { background: repeating-linear-gradient(45deg, var(--bg-subtle) 0, var(--bg-subtle) 8px, var(--bg) 8px, var(--bg) 16px); border: 1px dashed var(--border-strong); border-radius: var(--r-md); display: grid; place-items: center; color: var(--text-faint); font-family: var(--mono); font-size: 11px; }

.switch { width: 36px; height: 20px; border-radius: 999px; background: var(--bg-subtle); position: relative; transition: background 150ms; border: 1px solid var(--border); }
.switch::after { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: left 150ms; box-shadow: var(--shadow-xs); }
.switch.on { background: var(--accent); border-color: var(--accent); }
.switch.on::after { left: 18px; }

.check { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border-strong); background: white; display: inline-grid; place-items: center; flex-shrink: 0; }
.check.on { background: var(--accent); border-color: var(--accent); color: white; }

.avatar-list { display: flex; }
.avatar-list .avatar { margin-left: -6px; border: 2px solid white; width: 26px; height: 26px; font-size: 10px; }
.avatar-list .avatar:first-child { margin-left: 0; }

@media (max-width: 1100px) {
  .app { grid-template-columns: 200px 180px 1fr; }
  .page { padding: 20px; }
}

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: #CBD5E1; }
::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<!-- ICONS -->
<script type="text/babel" data-presets="react">
const Icon = ({ name, size = 16, stroke = 1.6, className = '', style = {} }) => {
  const s = { width: size, height: size, ...style };
  const props = {
    width: size, height: size,
    viewBox: '0 0 24 24', fill: 'none',
    stroke: 'currentColor', strokeWidth: stroke,
    strokeLinecap: 'round', strokeLinejoin: 'round',
    className, style: s,

        <div>{t.message}</div>
      </div>
    ))}
  </div>
);

const useToasts = () => {
  const [toasts, setToasts] = useState([]);
  const push = (message, kind = 'success') => {
    const id = Math.random().toString(36).slice(2);
    setToasts(ts => [...ts, { id, message, kind }]);
    setTimeout(() => setToasts(ts => ts.filter(t => t.id !== id)), 3500);
  };
  return { toasts, push };
};

    setTimeout(() => { setPending(false); onLogin(); }, 600);

    if (!/^\d?$/.test(v)) return;
    const next = [...code]; next[i] = v;
    setCode(next);
    if (v && i < 5) {
      const nextEl = document.getElementById(`d-${i+1}`);
      if (nextEl) nextEl.focus();
    }
    if (next.every(d => d !== '')) setTimeout(() => submit2FA(), 200);

                <div style={{ position: 'relative' }}>

                <span className={`check ${remember ? 'on' : ''}`} onClick={() => setRemember(!remember)}>
                  {remember && <Icon name="check" size={11} stroke={2.5}/>}
                </span>
                Remember this device for 30 days
              </label>
              <button type="submit" className="btn btn-primary btn-lg" disabled={pending} style={{ width: '100%', justifyContent: 'center' }}>

            <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '22px 0 16px', color: 'var(--text-muted)', fontSize: 11 }}>

            </div>
            <button type="button" className="btn btn-secondary" style={{ width: '100%', justifyContent: 'center' }}>
              <Icon name="lock" size={13}/> Single sign-on (SSO)
            </button>
            <div style={{ textAlign: 'center', marginTop: 24, fontSize: 12, color: 'var(--text-muted)' }}>
              No account yet? <a href="#" style={{ color: 'var(--accent-text)', fontWeight: 600 }}>Request a demo</a>
            </div>
          </form>
        )}
        {stage === 'twofa' && (
          <div>
            <button onClick={() => setStage('login')} style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 4 }}>

            <div className="login-sub">Enter the 6-digit code from your authenticator app for <strong style={{ color: 'var(--text)' }}>{email}</strong></div>

              {code.map((d, i) => (
                <input key={i} id={`d-${i}`} className="input" value={d} onChange={e => setDigit(i, e.target.value)} maxLength={1}
                  style={{ width: 48, height: 56, fontSize: 22, fontWeight: 700, textAlign: 'center', fontFamily: 'var(--mono)' }}
                  autoFocus={i === 0} />
              ))}
            </div>
            <button type="button" className="btn btn-primary btn-lg" onClick={submit2FA} disabled={pending} style={{ width: '100%', justifyContent: 'center' }}>
              {pending ? 'Verifying…' : 'Verify and continue'}

            <div style={{ background: 'var(--bg-tinted)', border: '1px solid var(--accent-soft)', borderRadius: 'var(--r-md)', padding: 12, marginTop: 18, fontSize: 12, color: 'var(--accent-text)', display: 'flex', gap: 10 }}>

      <div style={{ position: 'absolute', bottom: 20, left: 0, right: 0, textAlign: 'center', fontSize: 11, color: 'var(--text-faint)' }}>
        © 2026 PTMS · Built by Tanawat · v0.9.0
      </div>
    </div>
  );
};

</script>

const RevenueChart = () => {
  const data = [12, 14, 15, 18, 19, 22, 24, 26, 28, 30, 33, 34];
  const w = 600, h = 200, pad = 24;
  const max = 40;
  const x = i => pad + (i * (w - pad * 2)) / (data.length - 1);
  const y = v => h - pad - (v / max) * (h - pad * 2);
  const path = data.map((v, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(v)}`).join(' ');
  const area = `${path} L ${x(data.length-1)} ${h - pad} L ${pad} ${h - pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: '100%', height: 'auto' }}>
      <defs>
        <linearGradient id="rev-grad" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="#7AB8E6" stopOpacity="0.25"/>
          <stop offset="100%" stopColor="#7AB8E6" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {[10, 20, 30].map(v => <line key={v} x1={pad} x2={w-pad} y1={y(v)} y2={y(v)} stroke="#EDF1F6" strokeWidth="1"/>)}
      {[10, 20, 30].map(v => <text key={`l-${v}`} x={4} y={y(v)+4} fontSize="10" fill="#94A3B8">฿{v}k</text>)}
      <path d={area} fill="url(#rev-grad)"/>
      <path d={path} fill="none" stroke="#7AB8E6" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
      {data.map((v, i) => <circle key={i} cx={x(i)} cy={y(v)} r="3" fill="white" stroke="#7AB8E6" strokeWidth="1.6"/>)}
      {['Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May'].map((m, i) => <text key={m} x={x(i)} y={h-6} fontSize="10" fill="#94A3B8" textAnchor="middle">{m}</text>)}
    </svg>
  );
};

const PlanMixChart = () => {
  const data = [
    { label: 'Enterprise', value: 3, color: '#7AB8E6' },
    { label: 'Business', value: 6, color: '#A8C8E8' },
    { label: 'Starter', value: 3, color: '#D6E2EC' },
  ];
  const total = data.reduce((s, d) => s + d.value, 0);
  let acc = 0;
  const r = 60, cx = 80, cy = 80;
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
      <svg viewBox="0 0 160 160" width="140" height="140">
        {data.map((d, i) => {
          const a0 = (acc / total) * Math.PI * 2 - Math.PI/2;
          acc += d.value;
          const a1 = (acc / total) * Math.PI * 2 - Math.PI/2;
          const large = d.value / total > 0.5 ? 1 : 0;
          const x0 = cx + r * Math.cos(a0), y0 = cy + r * Math.sin(a0);
          const x1 = cx + r * Math.cos(a1), y1 = cy + r * Math.sin(a1);
          return <path key={i} d={`M ${cx} ${cy} L ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1} Z`} fill={d.color}/>;
        })}
        <circle cx={cx} cy={cy} r={36} fill="white"/>
        <text x={cx} y={cy-2} fontSize="20" fontWeight="700" fill="#0F172A" textAnchor="middle">12</text>
        <text x={cx} y={cy+12} fontSize="9" fill="#94A3B8" textAnchor="middle">TENANTS</text>
      </svg>
      <div style={{ flex: 1 }}>
        {data.map(d => (
          <div key={d.label} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '6px 0', fontSize: 12 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>

            </div>
            <div><strong>{d.value}</strong><span style={{ color: 'var(--text-muted)', marginLeft: 6 }}>{Math.round(d.value/total*100)}%</span></div>

        ))}
      </div>
    </div>
  );
};

const RolesAccess = () => {
  const [selected, setSelected] = useState('On Job Trainer');

    { module: 'Work Instructions', permissions: { Owner: 'full', 'Client Admin': 'full', HR: 'read', 'On Job Trainer': 'full', 'Quality Lead': 'read', 'Safety Lead': 'read', 'Line Lead': 'read', Employee: 'own' } },

  const permBadge = (p) => {

              </button>

              <tbody>
                {matrix.map(m => (
                  <tr key={m.module}>
                    <td className="cell-strong">{m.module}</td>
                    {Object.keys(m.permissions).map(k => (
                      <td key={k} style={{ textAlign: 'center', background: k === selected ? 'var(--accent-softer)' : undefined }}>{permBadge(m.permissions[k])}</td>
                    ))}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );

    <div style={{ position: 'fixed', inset: 0, background: 'var(--bg)', zIndex: 100, display: 'flex', flexDirection: 'column' }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 24px', borderBottom: '1px solid var(--border)', background: 'white' }}>
        <button className="icon-btn" onClick={onClose}><Icon name="chevron-left" size={16}/></button>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>{isNew ? 'New' : 'Edit'} · {data.dept}</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <input defaultValue={data.name || 'Untitled Work Instruction'} style={{ fontSize: 18, fontWeight: 700, border: 'none', outline: 'none', background: 'transparent', minWidth: 320, padding: '2px 4px', marginLeft: -4, borderRadius: 4, letterSpacing: '-0.015em' }} placeholder="Work Instruction title…" />
            <span className={`wi-type ${data.type.toLowerCase()}`}>{data.type}</span>
            <span className="badge outline cell-mono">{data.code}</span>
            <span className="badge">v{data.version} · {data.status}</span>
          </div>
        </div>
        <button className="btn btn-secondary"><Icon name="history" size={13}/> Version history</button>
        <button className="btn btn-secondary"><Icon name="eye" size={13}/> Preview</button>
        <button className="btn btn-secondary" onClick={() => { pushToast('Draft saved'); }}><Icon name="check" size={13}/> Save draft</button>
        <button className="btn btn-primary" onClick={() => { pushToast(`${data.name || 'Work Instruction'} published${isNew ? '' : ' as v' + (parseFloat(data.version) + 0.1).toFixed(1)}`); onClose(); }}><Icon name="send" size={13}/> Publish</button>
      </div>
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <div className="wi-sidebar">
          <div style={{ fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--text-muted)', padding: '4px 12px 10px' }}>Sections</div>
          {WI_STEPS.map((s, i) => (
            <div key={s.id} className={`wi-step ${step === s.id ? 'active' : ''} ${completed.has(s.id) ? 'done' : ''}`} onClick={() => setStep(s.id)}>
              <div className="wi-step-num">{completed.has(s.id) && step !== s.id ? <Icon name="check" size={11} stroke={2.5}/> : i + 1}</div>
              <Icon name={s.icon} size={14}/>
              <span>{s.label}</span>
            </div>
          ))}
          <div style={{ marginTop: 24, padding: 14, background: 'var(--bg-tinted)', borderRadius: 'var(--r-md)', fontSize: 11, color: 'var(--accent-text)' }}>
            <Icon name="sparkle" size={14}/>
            <div style={{ marginTop: 6, fontWeight: 600 }}>Critical WI rules</div>
            <div style={{ marginTop: 4 }}>Requires Quality + Trainer sign-off before publishing. Skill expiry auto-set to 12 months.</div>
          </div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: 32 }}>
          {step === 'info' && <WIStepInfo data={data} />}
          {step === 'preinsp' && <WIChecklistEditor title="Pre-inspection checklist" subtitle="Things to verify BEFORE starting the job — equipment ready, machine calibrated, materials staged." items={DEFAULT_PREINSP} icon="check" color="success" />}
          {step === 'ppe' && <WIPPEEditor />}
          {step === 'tools' && <WIToolsEditor />}
          {step === 'tasks' && <WITasksEditor />}
          {step === 'defects' && <WIDefectsEditor />}
          {step === 'postinsp' && <WIChecklistEditor title="Post-inspection checklist" subtitle="Verification AFTER the job — dimensions, torque, surface finish, cleanup." items={DEFAULT_POSTINSP} icon="shield-check" color="accent" />}
          {step === 'krs' && <WIKRSEditor />}
          <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 32, paddingTop: 20, borderTop: '1px solid var(--border)' }}>
            <button className="btn btn-secondary" onClick={() => { const i = WI_STEPS.findIndex(s => s.id === step); if (i > 0) setStep(WI_STEPS[i - 1].id); }} disabled={WI_STEPS[0].id === step}>
              <Icon name="chevron-left" size={13}/> Previous
            </button>
            <button className="btn btn-primary" onClick={() => { const i = WI_STEPS.findIndex(s => s.id === step); setCompleted(c => new Set([...c, step])); if (i < WI_STEPS.length - 1) setStep(WI_STEPS[i + 1].id); }}>
              {step === 'krs' ? 'Finish' : 'Save & continue'} <Icon name="chevron-right" size={13}/>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

        </div>
      </div>

);

const SectionHeader = ({ title, subtitle, action }) => (
  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 22 }}>
    <div>
      <h2 style={{ fontSize: 18, fontWeight: 700, margin: 0, letterSpacing: '-0.015em' }}>{title}</h2>
      {subtitle && <div style={{ fontSize: 13, color: 'var(--text-muted)', marginTop: 4 }}>{subtitle}</div>}
    </div>
    {action}
  </div>
);

const DEFAULT_PREINSP = ['Machine warmed up and at operating temperature','Calibration check passed (within last 8 hours)','Raw material lot # verified against order','Work area cleared and 5S compliant','Torque wrench calibration sticker valid'];
const DEFAULT_POSTINSP = ['All bolts torqued to spec (verified by indicator)','No visible defects under 200 lux inspection light','Parts placed in WIP bin labeled with shift + operator','5S walk-down: tools returned, area swept'];

const WIChecklistEditor = ({ title, subtitle, items, icon, color }) => {
  const [list, setList] = useState(items);
  return (
    <div style={{ maxWidth: 760 }}>
      <SectionHeader title={title} subtitle={subtitle} action={<button className="btn btn-secondary"><Icon name="copy" size={13}/> Copy from another WI</button>} />
      <div className="card">
        <div style={{ padding: 6 }}>
          {list.map((item, i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 14px', borderBottom: i < list.length - 1 ? '1px solid var(--border-soft)' : 'none' }}>
              <span style={{ color: 'var(--text-faint)', cursor: 'grab' }}><Icon name="more" size={14}/></span>
              <span style={{ width: 24, height: 24, borderRadius: 6, background: `var(--${color}-soft)`, color: `var(--${color}-text)`, display: 'grid', placeItems: 'center' }}><Icon name={icon} size={12} stroke={2.5}/></span>
              <span style={{ fontSize: 11, color: 'var(--text-muted)', fontWeight: 700, width: 18 }}>{i + 1}.</span>

              <span className="badge outline">Required</span>

        </div>
        <button className="btn btn-ghost" style={{ width: '100%', justifyContent: 'flex-start', padding: 14, borderTop: '1px solid var(--border-soft)' }} onClick={() => setList([...list, 'New checklist item'])}>
          <Icon name="plus" size={13}/> Add checklist item
        </button>
      </div>
    </div>
  );
};

const WIPPEEditor = () => {
  const ppeOptions = [
    { name: 'Safety glasses', spec: 'ANSI Z87.1+', icon: 'eye' },
    { name: 'Cut-resistant gloves', spec: 'EN 388 cut level A4', icon: 'shield' },
    { name: 'Hard hat', spec: 'ANSI Z89.1 Type I', icon: 'hard-hat' },
    { name: 'Steel-toe boots', spec: 'EN ISO 20345 S3', icon: 'package' },
    { name: 'Hearing protection', spec: 'NRR 25+', icon: 'shield' },
    { name: 'Welding helmet', spec: 'Shade 10 auto-darkening', icon: 'shield-check' },
    { name: 'FR jacket', spec: 'NFPA 2112', icon: 'package' },

  ];
  const [selected, setSelected] = useState(new Set(['Safety glasses','Cut-resistant gloves','Steel-toe boots']));
  const toggle = n => { const next = new Set(selected); next.has(n) ? next.delete(n) : next.add(n); setSelected(next); };

    <div style={{ maxWidth: 880 }}>
      <SectionHeader title="PPE required" subtitle="Personal protective equipment that must be worn for this WI. Safety staff manages issuance." />
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 12 }}>
        {ppeOptions.map(p => {
          const on = selected.has(p.name);
          return (
            <div key={p.name} onClick={() => toggle(p.name)} style={{ background: on ? 'var(--accent-softer)' : 'white', border: '1px solid', borderColor: on ? 'var(--accent)' : 'var(--border)', borderRadius: 'var(--r-md)', padding: 14, cursor: 'pointer' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: on ? 'white' : 'var(--bg-subtle)', display: 'grid', placeItems: 'center', color: on ? 'var(--accent-text)' : 'var(--text-secondary)' }}><Icon name={p.icon} size={16}/></div>
                <span className={`check ${on ? 'on' : ''}`}>{on && <Icon name="check" size={10} stroke={2.5}/>}</span>
              </div>
              <div style={{ fontSize: 13, fontWeight: 600 }}>{p.name}</div>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>{p.spec}</div>

      </div>

};

const WITasksEditor = () => {
  const [tasks, setTasks] = useState([
    { title: 'Stage engine mount on jig', desc: 'Orientation arrow points outboard. Verify part number EM-XJ-104.', duration: 30, photos: 2 },
    { title: 'Hand-thread 4× M10 bolts', desc: 'Use lubricant on threads. Snug to 5 Nm by hand before stage 3.', duration: 45, photos: 1 },
    { title: 'Cross-pattern torque to 25 Nm', desc: 'Pattern: 1-3-2-4. Pause 2 seconds between bolts.', duration: 35, photos: 1 },
    { title: 'Final torque to 78 Nm (±2)', desc: 'Cross pattern again. Verify each with click wrench.', duration: 40, photos: 1 },
    { title: 'Apply yellow paint mark', desc: 'Single vertical line across bolt head + mount edge for visual verification.', duration: 20, photos: 1 },
  ]);
  const [expanded, setExpanded] = useState(new Set([0]));
  const toggle = i => { const n = new Set(expanded); n.has(i) ? n.delete(i) : n.add(i); setExpanded(n); };
  const totalDuration = tasks.reduce((s, t) => s + t.duration, 0);
  return (
    <div style={{ maxWidth: 880 }}>
      <SectionHeader title="Task steps" subtitle={`Sequential steps the operator follows. Each step can have photos, durations, and a sign-off. Total cycle time: ${totalDuration}s.`}
        action={<button className="btn btn-secondary"><Icon name="play" size={13}/> Preview as operator</button>} />
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {tasks.map((t, i) => (
          <div key={i} className="card">
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px', cursor: 'pointer' }} onClick={() => toggle(i)}>
              <span style={{ color: 'var(--text-faint)', cursor: 'grab' }}><Icon name="more" size={14}/></span>
              <div style={{ width: 32, height: 32, borderRadius: 8, background: 'var(--accent-soft)', color: 'var(--accent-text)', display: 'grid', placeItems: 'center', fontWeight: 700, fontSize: 13 }}>{i + 1}</div>
              <div style={{ flex: 1 }}>
                <input style={{ border: 'none', outline: 'none', fontWeight: 600, fontSize: 14, background: 'transparent', width: '100%' }} defaultValue={t.title}/>
                {!expanded.has(i) && <div style={{ fontSize: 12, color: 'var(--text-muted)', marginTop: 2 }}>{t.desc.slice(0, 80)}{t.desc.length > 80 ? '…' : ''}</div>}
              </div>
              <span className="badge"><Icon name="clock" size={10}/> {t.duration}s</span>
              <span className="badge"><Icon name="eye" size={10}/> {t.photos}</span>
              <Icon name={expanded.has(i) ? 'chevron-down' : 'chevron-right'} size={14}/>
            </div>
            {expanded.has(i) && (
              <div style={{ padding: '0 16px 16px', borderTop: '1px solid var(--border-soft)' }}>
                <div className="field" style={{ marginTop: 14 }}><label className="field-label">Detail / Operator instructions</label><textarea className="textarea" rows={3} defaultValue={t.desc}/></div>
                <div className="field-row-3" style={{ marginTop: 12 }}>
                  <div className="field"><label className="field-label">Target duration (s)</label><input className="input" type="number" defaultValue={t.duration}/></div>
                  <div className="field"><label className="field-label">Verification</label><select className="select"><option>Operator confirm</option><option>Trainer sign-off</option><option>Photo evidence</option></select></div>
                  <div className="field"><label className="field-label">Critical to quality?</label><select className="select"><option>No</option><option>Yes — flag KRS</option></select></div>
                </div>
                <div style={{ marginTop: 12 }}>
                  <label className="field-label">Reference photos / diagrams</label>
                  <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                    {[...Array(t.photos)].map((_, k) => <div key={k} className="img-placeholder" style={{ width: 100, height: 70 }}>step {i+1}-{k+1}</div>)}
                    <button className="img-placeholder" style={{ width: 100, height: 70, cursor: 'pointer' }}><Icon name="plus" size={16}/></button>
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
        <button className="btn btn-secondary" style={{ alignSelf: 'flex-start' }} onClick={() => setTasks([...tasks, { title: 'New step', desc: '', duration: 30, photos: 0 }])}>
          <Icon name="plus" size={13}/> Add step
        </button>
      </div>
    </div>
  );
};

  return (
    <div style={{ maxWidth: 880 }}>
      <SectionHeader title="Common defects" subtitle="Defects that can occur in this WI. Quality team adds detected ones during shifts." />
      <div className="card">
        <table className="tbl">
          <thead><tr><th>Defect</th><th>Severity</th><th>Likely cause</th><th>Detection method</th><th></th></tr></thead>

            {defects.map((d, i) => (
              <tr key={i}>
                <td>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <div style={{ width: 28, height: 28, borderRadius: 6, background: 'var(--danger-soft)', color: 'var(--danger-text)', display: 'grid', placeItems: 'center' }}><Icon name="bug" size={13}/></div>
                    <input style={{ border: 'none', outline: 'none', fontWeight: 500, background: 'transparent', minWidth: 200 }} defaultValue={d.name}/>
                  </div>
                </td>
                <td><select className="select" style={{ height: 28, padding: '0 8px', minWidth: 90 }} defaultValue={d.severity}><option>High</option><option>Medium</option><option>Low</option></select></td>
                <td><input style={{ border: 'none', outline: 'none', background: 'transparent', fontSize: 13, width: '100%' }} defaultValue={d.cause}/></td>
                <td><input style={{ border: 'none', outline: 'none', background: 'transparent', fontSize: 13, width: '100%' }} defaultValue={d.detection}/></td>
                <td><button className="icon-btn" onClick={() => setDefects(defects.filter((_, j) => j !== i))}><Icon name="trash" size={12}/></button></td>
              </tr>

          </tbody>
        </table>
        <button className="btn btn-ghost" style={{ width: '100%', justifyContent: 'flex-start', padding: 14, borderTop: '1px solid var(--border-soft)' }} onClick={() => setDefects([...defects, { name: 'New defect', severity: 'Medium', cause: '', detection: '' }])}>
          <Icon name="plus" size={13}/> Add defect
        </button>
      </div>
    </div>
  );
};

const WIKRSEditor = () => (
  <div style={{ maxWidth: 760 }}>
    <SectionHeader title="KRS — Key Result Specifications" subtitle="The measurable outputs that prove this WI was executed correctly. Used in audits and skill certification." />
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {[
        { metric: 'Final torque', target: '78 Nm', tolerance: '±2 Nm', method: 'Torque transducer audit', kind: 'measurement' },
        { metric: 'Cross-pattern adherence', target: '100%', tolerance: '0% deviation', method: 'Video review (random 5%)', kind: 'process' },
        { metric: 'Paint mark presence', target: 'Yes', tolerance: '—', method: 'Visual at downstream gate', kind: 'visual' },
        { metric: 'Cycle time', target: '170 s', tolerance: '+15%', method: 'PLC timestamp', kind: 'productivity' },
      ].map((k, i) => (
        <div key={i} className="card">
          <div style={{ padding: 16, display: 'grid', gridTemplateColumns: '180px 100px 80px 1fr auto', gap: 14, alignItems: 'center' }}>
            <div>
              <div style={{ fontSize: 11, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: '0.06em', fontWeight: 600 }}>{k.kind}</div>
              <input style={{ border: 'none', outline: 'none', fontWeight: 600, fontSize: 14, background: 'transparent', width: '100%' }} defaultValue={k.metric}/>
            </div>
            <div><div className="field-label" style={{ marginBottom: 2 }}>Target</div><input className="input" style={{ height: 32 }} defaultValue={k.target}/></div>
            <div><div className="field-label" style={{ marginBottom: 2 }}>Tol.</div><input className="input" style={{ height: 32 }} defaultValue={k.tolerance}/></div>
            <div><div className="field-label" style={{ marginBottom: 2 }}>Verification method</div><input className="input" style={{ height: 32 }} defaultValue={k.method}/></div>
            <button className="icon-btn"><Icon name="trash" size={12}/></button>
          </div>
        </div>
      ))}
      <button className="btn btn-secondary" style={{ alignSelf: 'flex-start' }}><Icon name="plus" size={13}/> Add KRS metric</button>
    </div>
    <div style={{ marginTop: 24, padding: 14, background: 'var(--success-soft)', borderRadius: 'var(--r-md)', fontSize: 12, color: 'var(--success-text)', display: 'flex', gap: 10 }}>
      <Icon name="shield-check" size={16}/>
      <div><strong>Ready to publish.</strong> Once approved, this WI becomes available for skill certification. Operators currently certified on v2.2 will be marked as "needs review" until they re-pass on v2.3.</div>
    </div>
  </div>
);

  const [showOnboard, setShowOnboard] = useState(false);
  const { toasts, push } = useToasts();

  useEffect(() => {
    const saved = localStorage.getItem('ptms:state');
    if (saved) {
      try {
        const s = JSON.parse(saved);
        if (s.authed) setAuthed(true);
        if (s.role) setRole(s.role);
        if (s.screen) setScreen(s.screen);
      } catch {}
    }
  }, []);
  useEffect(() => {
    localStorage.setItem('ptms:state', JSON.stringify({ authed, role, screen }));
  }, [authed, role, screen]);

  if (!authed) return <window.AuthScreen onLogin={() => { setAuthed(true); push('Signed in as Tanawat (Super Owner)'); }} />;

  const onRoleChange = (r) => {
    setRole(r);
    setScreen(DEFAULT_SCREENS[r]);
    push(`Switched to ${ROLE_DEFS.find(x => x.id === r).label}`, 'success');

  const onNav = (s) => {

    setScreen(s);
  };

        {screen === 'admin.audit' && <window.AuditLog />}
